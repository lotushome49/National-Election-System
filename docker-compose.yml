version: "3.9"

services:
  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: nehs_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nehs_db
      POSTGRES_USER: nehs_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strongpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nehs_user -d nehs_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nehs_net

  # ── Backend API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: nehs_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      API_VERSION: v1
      DATABASE_URL: postgresql://nehs_user:${POSTGRES_PASSWORD:-strongpassword}@db:5432/nehs_db?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: 7d
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CSRF_SECRET: ${CSRF_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
      AUTH_RATE_LIMIT_MAX: 10
      LOG_LEVEL: info
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - api_logs:/app/logs
    networks:
      - nehs_net

  # ── Adminer (DB GUI — dev only) ───────────────────────────────────────────────
  adminer:
    image: adminer:4
    container_name: nehs_adminer
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"
    networks:
      - nehs_net
    profiles:
      - dev

volumes:
  postgres_data:
  api_logs:

networks:
  nehs_net:
    driver: bridge
